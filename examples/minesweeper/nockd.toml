# Declarative deploy manifest for minesweeper.
#   nockd deploy -f nockd.toml
#   nockd restart minesweeper
#
# project = "." builds the artifact client-side via nockup, then ships it (project-mode
# deploy). The prebuilt fallback also works:
#
#   nockd deploy minesweeper \
#     --bin ./target/release/minesweeper \
#     --jam ./out.jam \
#     --restart always \
#     --status-label MOVES \
#     --status-cmd "grep -aoE 'moves=[0-9]+' | tail -1 | grep -aoE '[0-9]+'"
#
# This app has NO Nockchain endpoint, so there is no `endpoint` field.
[deploy]
app     = "minesweeper"
project = "."
restart = "always"

# HTTP port, declared once. nockd exports it as NOCKD_APP_PORT (main.rs bridges it to the driver's
# HTTP_PORT) and the dashboard shows an "Open app ↗" relay link to localhost:<port>.
port    = 8084

# Status metric: nockd runs this every few seconds with the ANSI- and NUL-stripped recent
# log on stdin and cwd = the app's state dir. The kernel logs `metric: moves=<N>` on EVERY
# request, so the most recent cumulative move count surfaces as the MOVES column in `nockd ps`.
#
# NOTE the `-a`: the nockapp kernel boot log contains NUL bytes; BSD grep (macOS) treats
# NUL-bearing stdin as binary and suppresses `-o` output. `grep -a` forces text mode.
[deploy.status]
label = "MOVES"
cmd   = "grep -aoE 'moves=[0-9]+' | tail -1 | grep -aoE '[0-9]+'"
