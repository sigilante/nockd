# Declarative deploy manifest for http-static.
#   nockd deploy -f nockd.toml      # registers the app (project-mode: nockd builds via nockup)
#   nockd restart http-static       # swaps in the freshly built artifact
#
# project = "." is the intended UX: nockd shells out to the real client-side toolchain
# (nockup) with the absolute project path to build the artifact, then ships it. This is a
# single-bin project, so no `bin_target` is needed.
#
# This app has NO Nockchain endpoint, so there is no `endpoint` field.
[deploy]
app     = "http-static"
project = "."
restart = "always"

# HTTP port, declared once. nockd exports it as NOCKD_APP_PORT (main.rs bridges it to the
# driver's HTTP_PORT) and the dashboard shows an "Open app ↗" relay link to localhost:<port>.
port    = 8083

# Status metric: nockd runs this every few seconds with the ANSI- and NUL-stripped recent log
# on stdin and cwd = the app's state dir. The kernel logs `metric: requests=<N>` on EVERY
# request, so the most recent value is always available to grep, surfacing the live request
# tally as the REQ column in `nockd ps`.
[deploy.status]
label = "REQ"
cmd   = "grep -oE 'requests=[0-9]+' | tail -1 | grep -oE '[0-9]+'"
