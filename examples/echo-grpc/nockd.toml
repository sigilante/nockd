# Declarative deploy manifest for echo-grpc (DESIGN §7.2).
#   nockd deploy -f nockd.toml
#
# project = "." is the INTENDED UX: it builds the artifact with the real client-side
# toolchain (nockup), exercising DESIGN principle 7's build/run split. NOTE: project-mode
# deploy is currently BROKEN on this nockd/nockup pair (nockd runs `nockup project build`
# with no arg from inside the project dir, which nockup rejects — see RECIPE.md). The proven
# path is the prebuilt `--bin`/`--jam` deploy documented in README.md; this manifest captures
# the intended shape.
[deploy]
app      = "echo-grpc"
project  = "."
restart  = "always"

# The app's private/admin gRPC address. nockd health-probes it via the tonic health service
# the private gRPC server exposes. We also pass it to the app so the bind address and the
# health-probe address agree. Port 5561 is this demo's documented private gRPC port.
health-addr = "127.0.0.1:5561"
args        = ["--grpc-addr", "127.0.0.1:5561"]

# Status metric: nockd runs this every 5s with the ANSI-stripped recent log on stdin and
# cwd = the app's state dir. The listen process prints `metric: pokes=<N>` (one per gRPC poke
# served), so this surfaces the echo count as the POKES column in `nockd ps`.
#
# NOTE the `-a`: the nockapp kernel boot log contains NUL bytes (raw atom dumps). nockd strips
# ANSI but not NULs, and BSD grep (macOS) treats NUL-bearing stdin as *binary* and suppresses
# `-o` output — so the plain `grep -oE ...` from the docs silently yields NO value. `grep -a`
# forces text mode and fixes it on both BSD and GNU grep.
[deploy.status]
label = "POKES"
cmd   = "grep -aoE 'pokes=[0-9]+' | tail -1 | grep -aoE '[0-9]+'"
