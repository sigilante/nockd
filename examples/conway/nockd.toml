# Declarative deploy manifest for conway.
#   nockd deploy -f nockd.toml
#   nockd restart conway
#
# project = "." builds the artifact client-side via nockup, then ships it (project-mode
# deploy). The prebuilt fallback also works:
#
#   nockd deploy conway \
#     --bin ./target/release/conway \
#     --jam ./out.jam \
#     --restart always \
#     --status-label GEN \
#     --status-cmd "grep -aoE 'gen=[0-9]+' | tail -1 | grep -aoE '[0-9]+'"
#
# This app has NO Nockchain endpoint, so there is no `endpoint` field.
[deploy]
app     = "conway"
project = "."
restart = "always"

# Status metric: nockd runs this every few seconds with the ANSI- and NUL-stripped recent
# log on stdin and cwd = the app's state dir. The kernel logs `metric: gen=<N>` on EVERY
# request, so the most recent generation count surfaces as the GEN column in `nockd ps`.
#
# NOTE the `-a`: the nockapp kernel boot log contains NUL bytes; BSD grep (macOS) treats
# NUL-bearing stdin as binary and suppresses `-o` output. `grep -a` forces text mode.
[deploy.status]
label = "GEN"
cmd   = "grep -aoE 'gen=[0-9]+' | tail -1 | grep -aoE '[0-9]+'"
