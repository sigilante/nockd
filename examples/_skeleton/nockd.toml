# Deploy manifest — `nockd deploy -f nockd.toml`. Edit the marked fields.
[deploy]
app     = "CHANGEME"                 # your app name (shows in ps/logs/dashboard)
project = "."                        # build this project via nockup (project mode), OR:
# bin_target = "listen"              #   multi-bin project? name the [[bin]] to ship
#                                    #   (→ target/release/listen + listen.jam, not out.jam)
# bin   = "target/release/CHANGEME"  #   ship a prebuilt binary…
# jam   = "out.jam"                  #   …and kernel (omit jam for binary-only apps)
restart = "on-failure"               # always | on-failure | never

# Args passed through to the app. For a chain app, take the RPC URL via {endpoint}:
# args = ["--nockchain-grpc", "{endpoint}"]
args = []

# HTTP NockApp? Declare the port ONCE here. nockd exports it as NOCKD_PORT (read it in your
# app to bind — don't hardcode a port) and substitutes {port} in args, and the dashboard shows
# an "Open app ↗" relay link to localhost:<port>.
# port = 8085

# A named Nockchain endpoint this app attaches to. Register it once:
#   nockd endpoint add mainnet-rpc https://rpc.nockchain.net
# nockd substitutes {endpoint} in args + sets NOCKD_ENDPOINT_URL.
# endpoint = "mainnet-rpc"

# Custom status metric: nockd runs this every 5s with the ANSI/NUL-stripped recent log piped
# to stdin. Log your metric on one line (e.g. `metric: requests=42`) and grep it here.
[deploy.status]
label = "REQ"
cmd   = "grep -oE 'requests=[0-9]+' | tail -1 | grep -oE '[0-9]+'"
