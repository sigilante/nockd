# Declarative deploy manifest for http-counter (DESIGN §7.2).
#   nockd deploy -f nockd.toml
#
# project = "." is the INTENDED UX: nockd shells out to the real client-side toolchain
# (nockup) with the absolute project path to build the artifact, then ships it. This is a
# single-bin project, so no `bin_target` is needed. Deploy + activate with:
#
#   nockd deploy -f nockd.toml      # registers + builds the app via nockup
#   nockd restart http-counter      # swaps in the freshly built artifact
#
# This app has NO Nockchain endpoint, so there is no `endpoint` field.
[deploy]
app     = "http-counter"
project = "."
restart = "always"

# HTTP port, declared once. nockd exports it as NOCKD_APP_PORT (main.rs bridges it to the
# driver's HTTP_PORT) and the dashboard shows an "Open app ↗" relay link to localhost:<port>.
port    = 8081

# Status metric: nockd runs this every few seconds with the ANSI-stripped recent log on
# stdin and cwd = the app's state dir. The kernel logs `metric: count=<N>` on EVERY request
# (GET/increment/reset), so the most recent value is always available to grep, surfacing the
# live counter as the COUNT column in `nockd ps`.
#
# NOTE the `-a`: the nockapp kernel boot log contains NUL bytes (raw atom dumps, e.g. the
# build-hash line). nockd strips ANSI but not NULs, and BSD grep (macOS) treats NUL-bearing
# stdin as *binary* and suppresses `-o` output -- so a plain `grep -oE ...` silently yields
# NO value. `grep -a` forces text mode and works on both BSD and GNU grep.
[deploy.status]
label = "COUNT"
cmd   = "grep -aoE 'count=[0-9]+' | tail -1 | grep -aoE '[0-9]+'"
