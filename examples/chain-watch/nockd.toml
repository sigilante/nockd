# Declarative deploy manifest for chain-watch (DESIGN §7.2).
#   nockd deploy -f nockd.toml
#
# project = "." builds the artifact with the real client-side toolchain (nockup), exercising
# DESIGN principle 7's build/run split, rather than shipping a prebuilt --bin/--jam.
[deploy]
app      = "chain-watch"
project  = "."
restart  = "always"

# Endpoint-by-name (DESIGN §5.3): nockd resolves "mainnet-rpc" from its endpoint registry
# and injects the URL — substituting {endpoint} in args and setting NOCKD_ENDPOINT_URL.
endpoint = "mainnet-rpc"
args     = ["--endpoint", "{endpoint}"]

# Status metric: nockd runs this every 5s with the ANSI-stripped recent log on stdin and
# cwd = the app's state dir. Our log line `metric: height=<N>` makes this a one-line grep,
# surfacing the live chain tip as the HEIGHT column in `nockd ps`.
#
# NOTE the `-a`: the nockapp kernel boot log contains NUL bytes (raw atom dumps, e.g. the
# build-hash line). nockd strips ANSI but not NULs, and BSD grep (macOS) treats NUL-bearing
# stdin as *binary* and suppresses `-o` output — so the plain `grep -oE ...` from the docs
# silently yields NO value. `grep -a` forces text mode and fixes it. (GNU grep on Linux is
# more lenient, but `-a` is correct on both.)
[deploy.status]
label = "HEIGHT"
cmd   = "grep -aoE 'height=[0-9]+' | tail -1 | grep -aoE '[0-9]+'"
